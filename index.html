<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SHOP</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />

<style>
/* Reset & Basic Styles */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html {
  scroll-behavior: smooth;
}
body {
  font-family: "IBM Plex Mono", monospace;
  background: #fff;
  color: #000;
  text-transform: uppercase;
  overflow-x: hidden;
}

/* Buttons & Images */
button {
  font: inherit;
  background: none;
  border: 1px solid black;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.3s;
}
button:hover {
  background: #eee;
}
img {
  display: block;
  width: 100%;
}

/* Variables */
:root {
  --border: 1px solid #000;
  --padding: 20px;
  --transition: 0.25s ease;
}

/* Header */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 64px;
  padding: 0 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #fff;
  border-bottom: var(--border);
  z-index: 1000;
}
.logo {
  font-size: 14px;
  letter-spacing: 2px;
}
.cart-button {
  cursor: pointer;
  user-select: none;
}

/* Shop Grid */
.shop {
  margin-top: 64px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  transition: grid-template-columns 0.5s ease;
}
.product {
  border-right: var(--border);
  border-bottom: var(--border);
  cursor: pointer;
  transition: opacity var(--transition);
}
.product:nth-child(even) {
  border-right: none;
}
.product:hover {
  opacity: 0.75;
}
.product img {
  aspect-ratio: 1/1;
  object-fit: cover;
}
.product-info {
  padding: 16px;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  letter-spacing: 1px;
}

/* Responsive */
@media (max-width: 700px) {
  .shop {
    grid-template-columns: 1fr;
  }
  .product {
    border-right: none;
  }
}

/* Product Page */
.product-page {
  position: fixed;
  top: 64px;
  left: 0;
  width: 100%;
  height: calc(100vh - 64px);
  background: #fff;
  display: none;
  overflow: auto;
  z-index: 900;
}
.product-page.active {
  display: grid;
  grid-template-columns: 1fr 420px;
}
.product-image {
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  cursor: default;
  background: #fff;
}
.product-image img {
  pointer-events:none;
  user-select:none;
  touch-action:none;
  width: 100%;
  height: 100%;
  object-fit: contain;
  transition: transform 0.25s ease;
  transform-origin: center;
}
.product-details {
  border-left: var(--border);
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.product-title {
  font-size: 18px;
  letter-spacing: 2px;
}
.product-price {
  font-size: 14px;
}
.product-description {
  font-size: 13px;
  line-height: 1.8;
  white-space: pre-line;
}
.add-button {
  width: 100%;
  padding: 18px;
  font-size: 18px;
  margin-top: auto;
  background-color: #000;
  color: #fff;
  border: none;
  cursor: pointer;
}

/* Cart Drawer */
.cart {
  position: fixed;
  top: 0;
  right: -420px;
  width: 420px;
  max-width: 100%;
  height: 100vh;
  background: #fff;
  border-left: var(--border);
  transition: right 0.35s ease;
  padding: 24px;
  overflow: auto;
  z-index: 2000;
}
.cart.active {
  right: 0;
}
.cart-title {
  font-size: 18px;
  margin-bottom: 30px;
}
.cart-item {
  padding: 20px 0;
  border-bottom: var(--border);
}
.cart-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 10px;
}
.qty-btn {
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: var(--border);
}
.remove {
  margin-top: 12px;
  font-size: 12px;
  cursor: pointer;
  color: red;
}
.subtotal {
  margin-top: 32px;
  font-size: 15px;
}
.checkout-button {
  margin-top: 20px;
  width: 100%;
  padding: 18px;
}

/* Checkout */
.checkout {
  display: none;
  padding: 120px 10vw 80px;
  max-width: 800px;
  margin: auto;
}
.checkout.active {
  display: block;
}
.checkout h2 {
  margin-bottom: 40px;
  font-size: 18px;
}
.checkout label {
  display: block;
  margin-top: 24px;
  margin-bottom: 10px;
  font-size: 12px;
}
.checkout input {
  width: 100%;
  padding: 16px;
  border: var(--border);
  font: inherit;
  text-transform: uppercase;
  outline: none;
}
#placeOrder {
  margin-top: 40px;
  width: 100%;
  padding: 18px;
  background-color: #000;
  color: #fff;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* Animations */
.fade {
  animation: fade 0.3s ease;
}
@keyframes fade {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

/* Responsive adjustments for smaller screens */
@media(max-width: 900px) {
  .product-page.active {
    grid-template-columns: 1fr;
  }
  .product-details {
    border-left: none;
    border-top: var(--border);
  }
  .cart {
    width: 100%;
  }
}

/* Animation for the toggle button */
.rotate {
  transition: transform 0.5s ease;
}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo" id="toggleButton">+</div>
  <div class="cart-button" id="openCart">BAG (<span id="cartCount">0</span>)</div>
</header>

<!-- Shop Grid -->
<main class="shop" id="shop">
  <!-- Product Items will be dynamically generated here -->
</main>

<!-- Product Page -->
<section class="product-page" id="productPage">
  <div class="product-image">
    <img id="productImage" src="" alt="PRODUCT" />
  </div>
  <div class="product-details">
    <button id="backButton">← BACK</button>
    <div class="product-title" id="productTitle">PRODUCT</div>
    <div class="product-price" id="productPrice">$0</div>
    <div class="product-description" id="productDescription">PLACEHOLDER DESCRIPTION. 100% COTTON. MADE IN USA.</div>
    <button class="add-button" id="addToCart">ADD TO BAG</button>
  </div>
</section>

<!-- Cart Drawer -->
<aside class="cart" id="cart">
  <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
    <div class="cart-title">BAG</div>
    <button id="closeCart">✕</button>
  </div>
  <div id="cartItems"><p>YOUR BAG IS EMPTY.</p></div>
  <div class="subtotal">SUBTOTAL <div id="subtotal">$0</div></div>
  <button class="checkout-button" id="goCheckout">CHECKOUT</button>
</aside>

<!-- Checkout -->
<section class="checkout" id="checkout">
  <h2>CHECKOUT</h2>
  <!-- Form fields omitted for brevity -->
  <button id="placeOrder">PLACE ORDER</button>
</section>

<!-- Order Complete -->
<section class="checkout" id="complete">
  <h2>THANK YOU.</h2>
  <p>YOUR ORDER HAS BEEN RECEIVED.</p>
  <button id="continueShopping">CONTINUE SHOPPING</button>
</section>

<script>
// JavaScript Section

// Data
const products = [
  { id: 1, name: "PRODUCT 01", price: 20, image: "https://placehold.co/900x900?text=PRODUCT+01", description: "PLACEHOLDER DESCRIPTION." },
  { id: 2, name: "PRODUCT 02", price: 25, image: "https://placehold.co/900x900?text=PRODUCT+02", description: "PLACEHOLDER DESCRIPTION." },
  { id: 3, name: "PRODUCT 03", price: 30, image: "https://placehold.co/900x900?text=PRODUCT+03", description: "PLACEHOLDER DESCRIPTION." },
  { id: 4, name: "PRODUCT 04", price: 35, image: "https://placehold.co/900x900?text=PRODUCT+04", description: "PLACEHOLDER DESCRIPTION." },
  { id: 5, name: "PRODUCT 05", price: 40, image: "https://placehold.co/900x900?text=PRODUCT+05", description: "PLACEHOLDER DESCRIPTION." },
  { id: 6, name: "PRODUCT 06", price: 45, image: "https://placehold.co/900x900?text=PRODUCT+06", description: "PLACEHOLDER DESCRIPTION." },
  { id: 7, name: "PRODUCT 07", price: 50, image: "https://placehold.co/900x900?text=PRODUCT+07", description: "PLACEHOLDER DESCRIPTION." },
  { id: 8, name: "PRODUCT 08", price: 55, image: "https://placehold.co/900x900?text=PRODUCT+08", description: "PLACEHOLDER DESCRIPTION." },
  { id: 9, name: "PRODUCT 09", price: 60, image: "https://placehold.co/900x900?text=PRODUCT+09", description: "PLACEHOLDER DESCRIPTION." },
  { id: 10, name: "PRODUCT 10", price: 65, image: "https://placehold.co/900x900?text=PRODUCT+10", description: "PLACEHOLDER DESCRIPTION." },
  { id: 11, name: "PRODUCT 11", price: 70, image: "https://placehold.co/900x900?text=PRODUCT+11", description: "PLACEHOLDER DESCRIPTION." },
  { id: 12, name: "PRODUCT 12", price: 75, image: "https://placehold.co/900x900?text=PRODUCT+12", description: "PLACEHOLDER DESCRIPTION." },
  { id: 13, name: "PRODUCT 13", price: 80, image: "https://placehold.co/900x900?text=PRODUCT+13", description: "PLACEHOLDER DESCRIPTION." },
  { id: 14, name: "PRODUCT 14", price: 85, image: "https://placehold.co/900x900?text=PRODUCT+14", description: "PLACEHOLDER DESCRIPTION." },
];

let cart = [];
let currentProduct = null;
let isExpanded = false;

// DOM Elements
const shop = document.getElementById("shop");
const productPage = document.getElementById("productPage");
const productImage = document.getElementById("productImage");
const productTitle = document.getElementById("productTitle");
const productPrice = document.getElementById("productPrice");
const productDescription = document.getElementById("productDescription");
const addToCartBtn = document.getElementById("addToCart");
const cartDrawer = document.getElementById("cart");
const cartItemsContainer = document.getElementById("cartItems");
const cartCountSpan = document.getElementById("cartCount");
const subtotalSpan = document.getElementById("subtotal");
const checkoutPage = document.getElementById("checkout");
const completePage = document.getElementById("complete");
const toggleButton = document.getElementById("toggleButton");

// Load Products into Shop
function renderShop() {
  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";
    div.dataset.id = p.id;
    div.innerHTML = `
      <img src="${p.image}" alt="${p.name}" />
      <div class="product-info">
        <span>${p.name}</span>
        <span>$${p.price}</span>
      </div>
    `;
    shop.appendChild(div);
  });
}

// Open Product Page
function openProduct(id) {
  const product = products.find(p => p.id === id);
  if (!product) return;
  currentProduct = product;
  productImage.src = product.image;
  productImage.alt = product.name;
  productTitle.textContent = product.name;
  productPrice.textContent = `$${product.price}`;
  productDescription.textContent = product.description;
  productPage.classList.add("active");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// Close Product Page
document.getElementById("backButton").addEventListener("click", () => {
  productPage.classList.remove("active");
});

// Attach product click events
shop.addEventListener("click", (e) => {
  const productDiv = e.target.closest(".product");
  if (productDiv) {
    const id = Number(productDiv.dataset.id);
    openProduct(id);
  }
});

// Add to Cart
addToCartBtn.addEventListener("click", () => {
  if (!currentProduct) return;
  const existing = cart.find(p => p.id === currentProduct.id);
  if (existing) {
    existing.quantity++;
  } else {
    cart.push({ ...currentProduct, quantity: 1 });
  }
  updateCart();
  cartDrawer.classList.add("active");
});

// Cart toggle
document.getElementById("openCart").addEventListener("click", () => {
  updateCart();
  cartDrawer.classList.add("active");
});
document.getElementById("closeCart").addEventListener("click", () => {
  cartDrawer.classList.remove("active");
});

// Update Cart
function updateCart() {
  cartItemsContainer.innerHTML = "";
  if (cart.length === 0) {
    cartItemsContainer.innerHTML = "<p>YOUR BAG IS EMPTY.</p>";
    cartCountSpan.textContent = 0;
    subtotalSpan.textContent = "$0";
    return;
  }
  let total = 0;
  let count = 0;
  cart.forEach(item => {
    total += item.price * item.quantity;
    count += item.quantity;
    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <div class="cart-name">${item.name}</div>
      <div>$${item.price}</div>
      <div class="cart-controls">
        <button class="minus" data-id="${item.id}">−</button>
        <span>${item.quantity}</span>
        <button class="plus" data-id="${item.id}">+</button>
      </div>
      <div class="remove" data-id="${item.id}">REMOVE</div>
    `;
    cartItemsContainer.appendChild(div);
  });
  cartCountSpan.textContent = count;
  subtotalSpan.textContent = `$${total}`;
  attachCartControls();
}

// Attach cart control events (plus, minus, remove)
function attachCartControls() {
  document.querySelectorAll(".plus").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = Number(btn.dataset.id);
      const item = cart.find(p => p.id === id);
      if (item) {
        item.quantity++;
        updateCart();
      }
    });
  });
  document.querySelectorAll(".minus").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = Number(btn.dataset.id);
      const item = cart.find(p => p.id === id);
      if (item) {
        item.quantity--;
        if (item.quantity <= 0) {
          cart = cart.filter(p => p.id !== id);
        }
        updateCart();
      }
    });
  });
  document.querySelectorAll(".remove").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = Number(btn.dataset.id);
      cart = cart.filter(p => p.id !== id);
      updateCart();
    });
  });
}

// Open Product Page on product click
// (Handled by event delegation on shop container)

// Add current product to cart
document.getElementById("addToCart").addEventListener("click", () => {
  if (!currentProduct) return;
  const existing = cart.find(p => p.id === currentProduct.id);
  if (existing) {
    existing.quantity++;
  } else {
    cart.push({ ...currentProduct, quantity: 1 });
  }
  updateCart();
  cartDrawer.classList.add("active");
});

// Checkout
document.getElementById("goCheckout").addEventListener("click", () => {
  if (cart.length === 0) return;
  cartDrawer.classList.remove("active");
  productPage.classList.remove("active");
  shop.style.display = "none";
  document.getElementById("checkout").classList.add("active");
  window.scrollTo(0, 0);
});

// Place Order
document.getElementById("placeOrder").addEventListener("click", () => {
  document.getElementById("checkout").classList.remove("active");
  document.getElementById("complete").classList.add("active");
  cart = [];
  updateCart();
});

// Continue Shopping
document.getElementById("continueShopping").addEventListener("click", () => {
  document.getElementById("complete").classList.remove("active");
  shop.style.display = "grid";
  window.scrollTo(0, 0);
});

// Image zoom toggle
// zoom removed
let isZoomed = false;
productImage.addEventListener("click", () => {
  isZoomed = !isZoomed;
  productImage.style.transform = isZoomed ? "scale(2)" : "scale(1)";
});

// ESC key
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    productPage.classList.remove("active");
    cartDrawer.classList.remove("active");
  }
});

// Click outside cart
document.addEventListener("click", (e) => {
  if (
    cartDrawer.classList.contains("active") &&
    !cartDrawer.contains(e.target) &&
    !e.target.closest("#openCart")
  ) {
    cartDrawer.classList.remove("active");
  }
});

// Toggle shop layout

function animateGrid(columns){
  const cards=[...document.querySelectorAll(".product")];
  const first=cards.map(c=>c.getBoundingClientRect());
  shop.style.gridTemplateColumns=columns;
  requestAnimationFrame(()=>{
    const last=cards.map(c=>c.getBoundingClientRect());
    cards.forEach((card,i)=>{
      const dx=first[i].left-last[i].left;
      const dy=first[i].top-last[i].top;
      card.animate([
        {transform:`translate(${dx}px,${dy}px)`},
        {transform:"translate(0,0)"}
      ],{
        duration:550,
        easing:"cubic-bezier(.22,.61,.36,1)"
      });
    });
  });
}

toggleButton.addEventListener("click",()=>{
  isExpanded=!isExpanded;
  animateGrid(isExpanded?"repeat(2, 1fr)":"repeat(4, 1fr)");
  toggleButton.classList.toggle("rotate");
});


// Initialize shop
renderShop();

</script>
</body>
</html>
