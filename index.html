<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SHOP</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />

<style>
/* Reset & Basic Styles */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html {
  scroll-behavior: smooth;
}
body {
  font-family: "IBM Plex Mono", monospace;
  background: #fff;
  color: #000;
  text-transform: uppercase;
  overflow-x: hidden;
}

/* Buttons & Images */
button {
  font: inherit;
  background: none;
  border: 1px solid black;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.3s;
}
button:hover {
  background: #eee;
}
img {
  display: block;
  width: 100%;
}

/* Variables */
:root {
  --border: 1px solid #000;
  --padding: 20px;
  --transition: 0.25s ease;
}

/* Header */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 64px;
  padding: 0 24px;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  background: #fff;
  border-bottom: var(--border);
  z-index: 1000;
}

/* Plus Button */
#toggleGrid {
  font-size: 24px;
  cursor: pointer;
  user-select: none;
  display: inline-block;
  transition: transform 0.5s ease;
}

/* Shop Grid */
.shop {
  margin-top: 64px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 10px;
  transition: all 0.3s ease;
}
.shop.two-columns {
  grid-template-columns: repeat(2, 1fr);
}

/* Products */
.product {
  border: none; /* No grid lines */
  padding: 8px;
  transition: transform 0.2s ease;
  cursor: pointer;
}
.product:hover {
  opacity: 0.75;
}
.product img {
  aspect-ratio: 1/1;
  object-fit: cover;
}

/* Product Page */
.product-page {
  position: fixed;
  top: 64px;
  left: 0;
  width: 100%;
  height: calc(100vh - 64px);
  background: #fff;
  display: none;
  overflow: auto;
  z-index: 900;
}
.product-page.active {
  display: grid;
  grid-template-columns: 1fr 420px;
}
.product-image {
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  cursor: zoom-in;
  background: #fff;
}
.product-image img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  transition: transform 0.25s ease;
  transform-origin: center;
}
.product-details {
  border-left: var(--border);
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.product-title {
  font-size: 18px;
  letter-spacing: 2px;
}
.product-price {
  font-size: 14px;
}
.product-description {
  font-size: 13px;
  line-height: 1.8;
  white-space: pre-line;
}
.add-button {
  width: 100%;
  padding: 18px;
  font-size: 18px;
  margin-top: auto;
  background-color: #000;
  color: #fff;
  border: none;
  cursor: pointer;
}

/* Cart Drawer */
.cart {
  position: fixed;
  top: 0;
  right: -420px;
  width: 420px;
  max-width: 100%;
  height: 100vh;
  background: #fff;
  border-left: var(--border);
  transition: right 0.35s ease;
  padding: 24px;
  overflow: auto;
  z-index: 2000;
}
.cart.active {
  right: 0;
}
.cart-title {
  font-size: 18px;
  margin-bottom: 30px;
}
.cart-item {
  padding: 20px 0;
  border-bottom: var(--border);
}
.cart-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 10px;
}
.qty-btn {
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: var(--border);
}
.remove {
  margin-top: 12px;
  font-size: 12px;
  cursor: pointer;
  color: red;
}
.subtotal {
  margin-top: 32px;
  font-size: 15px;
}
.checkout-button {
  margin-top: 20px;
  width: 100%;
  padding: 18px;
}

/* Checkout */
.checkout {
  display: none;
  padding: 120px 10vw 80px;
  max-width: 800px;
  margin: auto;
}
.checkout.active {
  display: block;
}
.checkout h2 {
  margin-bottom: 40px;
  font-size: 18px;
}
.checkout label {
  display: block;
  margin-top: 24px;
  margin-bottom: 10px;
  font-size: 12px;
}
.checkout input {
  width: 100%;
  padding: 16px;
  border: var(--border);
  font: inherit;
  text-transform: uppercase;
  outline: none;
}

/* Animations for Yeezy-like slide */
@keyframes slideDown {
  from { transform: translateY(0); }
  to { transform: translateY(20px); }
}
@keyframes slideUp {
  from { transform: translateY(20px); }
  to { transform: translateY(0); }
}
</style>
</head>
<body>

<!-- Header with plus button -->
<header>
  <div class="plus-button" id="toggleGrid" title="Toggle grid size">＋</div>
</header>

<!-- Shop Grid -->
<main class="shop" id="shop">
  <!-- Product Items will be dynamically generated here -->
</main>

<!-- Product Page -->
<section class="product-page" id="productPage">
  <div class="product-image">
    <img id="productImage" src="" alt="PRODUCT" />
  </div>
  <div class="product-details">
    <button id="backButton">← BACK</button>
    <div class="product-title" id="productTitle">PRODUCT</div>
    <div class="product-price" id="productPrice">$0</div>
    <div class="product-description" id="productDescription">PLACEHOLDER DESCRIPTION. 100% COTTON. MADE IN USA.</div>
    <button class="add-button" id="addToCart">ADD TO BAG</button>
  </div>
</section>

<!-- Cart Drawer -->
<aside class="cart" id="cart">
  <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
    <div class="cart-title">BAG</div>
    <button id="closeCart">✕</button>
  </div>
  <div id="cartItems"><p>YOUR BAG IS EMPTY.</p></div>
  <div class="subtotal">SUBTOTAL <div id="subtotal">$0</div></div>
  <button class="checkout-button" id="goCheckout">CHECKOUT</button>
</aside>

<!-- Checkout -->
<section class="checkout" id="checkout">
  <h2>CHECKOUT</h2>
  <!-- Form fields omitted for brevity -->
  <button id="placeOrder">PLACE ORDER</button>
</section>

<!-- Order Complete -->
<section class="checkout" id="complete">
  <h2>THANK YOU.</h2>
  <p>YOUR ORDER HAS BEEN RECEIVED.</p>
  <button id="continueShopping">CONTINUE SHOPPING</button>
</section>

<script>
// Sample Products Data
const products = [
  { id: 1, name: "PRODUCT 01", price: 20, image: "https://placehold.co/900x900?text=PRODUCT+01", description: "PLACEHOLDER DESCRIPTION." },
  { id: 2, name: "PRODUCT 02", price: 25, image: "https://placehold.co/900x900?text=PRODUCT+02", description: "PLACEHOLDER DESCRIPTION." },
  { id: 3, name: "PRODUCT 03", price: 30, image: "https://placehold.co/900x900?text=PRODUCT+03", description: "PLACEHOLDER DESCRIPTION." },
  { id: 4, name: "PRODUCT 04", price: 35, image: "https://placehold.co/900x900?text=PRODUCT+04", description: "PLACEHOLDER DESCRIPTION." },
  { id: 5, name: "PRODUCT 05", price: 40, image: "https://placehold.co/900x900?text=PRODUCT+05", description: "PLACEHOLDER DESCRIPTION." },
  { id: 6, name: "PRODUCT 06", price: 45, image: "https://placehold.co/900x900?text=PRODUCT+06", description: "PLACEHOLDER DESCRIPTION." },
  { id: 7, name: "PRODUCT 07", price: 50, image: "https://placehold.co/900x900?text=PRODUCT+07", description: "PLACEHOLDER DESCRIPTION." },
  { id: 8, name: "PRODUCT 08", price: 55, image: "https://placehold.co/900x900?text=PRODUCT+08", description: "PLACEHOLDER DESCRIPTION." },
  { id: 9, name: "PRODUCT 09", price: 60, image: "https://placehold.co/900x900?text=PRODUCT+09", description: "PLACEHOLDER DESCRIPTION." },
  { id: 10, name: "PRODUCT 10", price: 65, image: "https://placehold.co/900x900?text=PRODUCT+10", description: "PLACEHOLDER DESCRIPTION." },
];

let cart = [];
let currentProduct = null;

// DOM Elements
const shop = document.getElementById("shop");
const productPage = document.getElementById("productPage");
const productImage = document.getElementById("productImage");
const productTitle = document.getElementById("productTitle");
const productPrice = document.getElementById("productPrice");
const productDescription = document.getElementById("productDescription");
const addToCartBtn = document.getElementById("addToCart");
const cartDrawer = document.getElementById("cart");
const cartItemsContainer = document.getElementById("cartItems");
const cartCountSpan = document.getElementById("cartCount");
const subtotalSpan = document.getElementById("subtotal");
const checkoutPage = document.getElementById("checkout");
const completePage = document.getElementById("complete");

// Render products
function renderShop() {
  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";
    div.dataset.id = p.id;
    div.innerHTML = `
      <img src="${p.image}" alt="${p.name}" />
      <div class="product-info">
        <span>${p.name}</span>
        <span>$${p.price}</span>
      </div>
    `;
    shop.appendChild(div);
  });
}

// Open product
function openProduct(id) {
  const product = products.find(p => p.id === id);
  if (!product) return;
  currentProduct = product;
  productImage.src = product.image;
  productImage.alt = product.name;
  productTitle.textContent = product.name;
  productPrice.textContent = `$${product.price}`;
  productDescription.textContent = product.description;
  productPage.classList.add("active");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// Close product
document.getElementById("backButton").addEventListener("click", () => {
  productPage.classList.remove("active");
});

// Product click event
shop.addEventListener("click", (e) => {
  const productDiv = e.target.closest(".product");
  if (productDiv) {
    const id = Number(productDiv.dataset.id);
    openProduct(id);
  }
});

// Add to cart
addToCartBtn.addEventListener("click", () => {
  if (!currentProduct) return;
  const existing = cart.find(p => p.id === currentProduct.id);
  if (existing) {
    existing.quantity++;
  } else {
    cart.push({ ...currentProduct, quantity: 1 });
  }
  updateCart();
  cartDrawer.classList.add("active");
});

// Cart toggle
document.getElementById("openCart").addEventListener("click", () => {
  updateCart();
  cartDrawer.classList.add("active");
});
document.getElementById("closeCart").addEventListener("click", () => {
  cartDrawer.classList.remove("active");
});

// Update cart
function updateCart() {
  cartItemsContainer.innerHTML = "";
  if (cart.length === 0) {
    cartItemsContainer.innerHTML = "<p>YOUR BAG IS EMPTY.</p>";
    cartCountSpan.textContent = 0;
    subtotalSpan.textContent = "$0";
    return;
  }
  let total = 0;
  let count = 0;
  cart.forEach(item => {
    total += item.price * item.quantity;
    count += item.quantity;
    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <div class="cart-name">${item.name}</div>
      <div>$${item.price}</div>
      <div class="cart-controls">
        <button class="minus" data-id="${item.id}">−</button>
        <span>${item.quantity}</span>
        <button class="plus" data-id="${item.id}">+</button>
      </div>
      <div class="remove" data-id="${item.id}">REMOVE</div>
    `;
    cartItemsContainer.appendChild(div);
  });
  document.querySelectorAll(".plus").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = Number(btn.dataset.id);
      const item = cart.find(p => p.id === id);
      if (item) {
        item.quantity++;
        updateCart();
      }
    });
  });
  document.querySelectorAll(".minus").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = Number(btn.dataset.id);
      const item = cart.find(p => p.id === id);
      if (item) {
        item.quantity--;
        if (item.quantity <= 0) {
          cart = cart.filter(p => p.id !== id);
        }
        updateCart();
      }
    });
  });
  document.querySelectorAll(".remove").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = Number(btn.dataset.id);
      cart = cart.filter(p => p.id !== id);
      updateCart();
    });
  });
  // Update counts and subtotal
  cartCountSpan.textContent = count;
  subtotalSpan.textContent = `$${total}`;
}

// Open product page on click
// (handled by event delegation)

// Add current product to cart
document.getElementById("addToCart").addEventListener("click", () => {
  if (!currentProduct) return;
  const existing = cart.find(p => p.id === currentProduct.id);
  if (existing) {
    existing.quantity++;
  } else {
    cart.push({ ...currentProduct, quantity: 1 });
  }
  updateCart();
  cartDrawer.classList.add("active");
});

// Checkout button
document.getElementById("goCheckout").addEventListener("click", () => {
  if (cart.length === 0) return;
  cartDrawer.classList.remove("active");
  productPage.classList.remove("active");
  document.querySelector(".shop").style.display = "none";
  document.getElementById("checkout").classList.add("active");
  window.scrollTo(0, 0);
});

// Place order
document.getElementById("placeOrder").addEventListener("click", () => {
  document.getElementById("checkout").classList.remove("active");
  document.getElementById("complete").classList.add("active");
  cart = [];
  updateCart();
});

// Continue shopping
document.getElementById("continueShopping").addEventListener("click", () => {
  document.getElementById("complete").classList.remove("active");
  document.querySelector(".shop").style.display = "grid";
  window.scrollTo(0, 0);
});

// Image zoom toggle
let isZoomed = false;
productImage.addEventListener("click", () => {
  isZoomed = !isZoomed;
  productImage.style.transform = isZoomed ? "scale(2)" : "scale(1)";
});

// ESC key to close overlays
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    productPage.classList.remove("active");
    document.getElementById("checkout").classList.remove("active");
    document.getElementById("complete").classList.remove("active");
    cartDrawer.classList.remove("active");
  }
});

// Click outside cart to close
document.addEventListener("click", (e) => {
  if (
    document.querySelector(".cart").classList.contains("active") &&
    !document.querySelector(".cart").contains(e.target) &&
    !e.target.closest("#openCart")
  ) {
    document.querySelector(".cart").classList.remove("active");
  }
});

// Render the shop items
renderShop();

// Toggle grid layout with animation and spin plus button
const toggleBtn = document.getElementById('toggleGrid');
const shopContainer = document.getElementById('shop');

let isFourColumn = true;

toggleBtn.addEventListener('click', () => {
  // Animate spin
  toggleBtn.style.transition = 'transform 0.5s ease';
  toggleBtn.style.transform = 'rotate(80deg)';
  
  // Animate slide down
  shopContainer.style.transition = 'transform 0.3s ease';
  shopContainer.style.transform = 'translateY(-20px)';
  
  setTimeout(() => {
    // Toggle grid class
    shopContainer.classList.toggle('two-columns');
    isFourColumn = !isFourColumn;
    // Reset transformation
    shopContainer.style.transform = 'translateY(0)';
    // Rotate back with opposite direction
    toggleBtn.style.transform = 'rotate(0deg)';
  }, 500);
});
</script>
</body>
</html>
