<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shop Grid Toggle</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />

<style>
  /* Basic styles */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "IBM Plex Mono", monospace;
    background: #fff;
    color: #000;
    text-transform: uppercase;
    overflow-x: hidden;
  }

  /* Header with toggle button */
  header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 64px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    background: #fff;
    border-bottom: 1px solid #000;
    z-index: 10;
  }

  #toggleButton {
    font-size: 24px;
    cursor: pointer;
    user-select: none;
    padding: 10px;
    transition: transform 0.5s ease;
  }

  /* Shop grid styles */
  .shop {
    margin-top: 64px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 10px;
    transition: all 0.3s ease;
  }
  .shop.two-columns {
    grid-template-columns: repeat(2, 1fr);
  }

  /* Product item styles */
  .product {
    background: #f0f0f0;
    padding: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .product img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
  }
  .product span {
    margin-top: 8px;
  }

  /* Cart styles */
  #cart {
    position: fixed;
    top: 0;
    right: -400px;
    width: 400px;
    height: 100%;
    background: #fff;
    border-left: 1px solid #000;
    padding: 20px;
    box-shadow: -2px 0 5px rgba(0,0,0,0.3);
    transition: right 0.3s ease;
    z-index: 20;
    overflow-y: auto;
  }
  #cart.active {
    right: 0;
  }
  #cart h2 {
    margin-bottom: 20px;
  }
  #cart .cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }
  #cart .cart-item div {
    display: flex;
    flex-direction: column;
  }
  #cart .controls {
    display: flex;
    gap: 5px;
  }
  #cart button {
    padding: 4px 8px;
  }
  #cart .remove {
    color: red;
    cursor: pointer;
  }

  /* Product page styles */
 #productPage {
    display: none;
    position: fixed;
    top: 64px;
    left: 0;
    width: 100%;
    height: calc(100% - 64px);
    background: #fff;
    display: grid;
    grid-template-columns: 1fr 420px;
    z-index: 30;
    overflow: auto;
  }
  #productPage.active {
    display: grid;
  }
  #productImageContainer {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  #productImageContainer img {
    max-width: 100%;
    max-height: 80vh;
  }
  #productDetails {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #backButton {
    align-self: flex-start;
    cursor: pointer;
    background: none;
    border: 1px solid #000;
    padding: 8px 16px;
    font-size: 14px;
  }
  #addToCart {
    background: #000;
    color: #fff;
    padding: 12px;
    border: none;
    cursor: pointer;
    font-size: 16px;
  }

  /* Checkout styles */
#checkout, #complete {
    display: none;
    padding: 40px 20px;
    max-width: 600px;
    margin: auto;
    margin-top: 80px;
  }
#checkout.active, #complete.active {
    display: block;
  }
  #goCheckout, #placeOrder, #continueShopping {
    padding: 12px 24px;
    font-size: 16px;
    margin-top: 20px;
    cursor: pointer;
  }

</style>
</head>
<body>

<!-- Header with toggle button -->
<header>
  <div id="toggleButton" title="Toggle grid size">＋</div>
  <button style="margin-left:20px;" id="viewCartBtn">View Cart</button>
</header>

<!-- Shop grid -->
<main class="shop" id="shop"></main>

<!-- Product Page -->
<div id="productPage">
  <div id="productImageContainer">
    <img id="productImage" src="" alt="Product" />
  </div>
  <div id="productDetails">
    <button id="backButton">← Back</button>
    <div><strong id="productTitle">Product</strong></div>
    <div id="productPrice">$0</div>
    <div id="productDescription">PLACEHOLDER DESCRIPTION. 100% COTTON. MADE IN USA.</div>
    <button id="addToCart">ADD TO BAG</button>
  </div>
</div>

<!-- Cart Drawer -->
<div id="cart">
  <h2>BAG</h2>
  <div id="cartItems">YOUR BAG IS EMPTY.</div>
  <div style="margin-top:20px;">SUBTOTAL <div id="subtotal">$0</div></div>
  <button id="goCheckout">CHECKOUT</button>
</div>

<!-- Checkout -->
<div id="checkout">
  <h2>CHECKOUT</h2>
  <p>Implement checkout form here.</p>
  <button id="placeOrder">PLACE ORDER</button>
</div>

<!-- Completion -->
<div id="complete">
  <h2>THANK YOU.</h2>
  <p>YOUR ORDER HAS BEEN RECEIVED.</p>
  <button id="continueShopping">CONTINUE SHOPPING</button>
</div>

<script>
const products = [
  { id: 1, name: "PRODUCT 01", price: 20, image: "https://placehold.co/600x600?text=PRODUCT+01", description: "PLACEHOLDER DESCRIPTION." },
  { id: 2, name: "PRODUCT 02", price: 25, image: "https://placehold.co/600x600?text=PRODUCT+02", description: "PLACEHOLDER DESCRIPTION." },
  { id: 3, name: "PRODUCT 03", price: 30, image: "https://placehold.co/600x600?text=PRODUCT+03", description: "PLACEHOLDER DESCRIPTION." },
  { id: 4, name: "PRODUCT 04", price: 35, image: "https://placehold.co/600x600?text=PRODUCT+04", description: "PLACEHOLDER DESCRIPTION." },
  { id: 5, name: "PRODUCT 05", price: 40, image: "https://placehold.co/600x600?text=PRODUCT+05", description: "PLACEHOLDER DESCRIPTION." },
  { id: 6, name: "PRODUCT 06", price: 45, image: "https://placehold.co/600x600?text=PRODUCT+06", description: "PLACEHOLDER DESCRIPTION." },
  { id: 7, name: "PRODUCT 07", price: 50, image: "https://placehold.co/600x600?text=PRODUCT+07", description: "PLACEHOLDER DESCRIPTION." },
  { id: 8, name: "PRODUCT 08", price: 55, image: "https://placehold.co/600x600?text=PRODUCT+08", description: "PLACEHOLDER DESCRIPTION." },
  { id: 9, name: "PRODUCT 09", price: 60, image: "https://placehold.co/600x600?text=PRODUCT+09", description: "PLACEHOLDER DESCRIPTION." },
  { id: 10, name: "PRODUCT 10", price: 65, image: "https://placehold.co/600x600?text=PRODUCT+10", description: "PLACEHOLDER DESCRIPTION." },
];

let cart = [];
let currentProduct = null;

const shop = document.getElementById('shop');
const productPage = document.getElementById('productPage');
const productImage = document.getElementById('productImage');
const productTitle = document.getElementById('productTitle');
const productPrice = document.getElementById('productPrice');
const productDescription = document.getElementById('productDescription');

const cartDiv = document.getElementById('cart');
const cartItemsDiv = document.getElementById('cartItems');
const subtotalDiv = document.getElementById('subtotal');

const checkoutDiv = document.getElementById('checkout');
const completeDiv = document.getElementById('complete');

const toggleButton = document.getElementById('toggleButton');
const viewCartBtn = document.getElementById('viewCartBtn');

let isFourColumns = true;

// Render products
function renderShop() {
  products.forEach(p => {
    const div = document.createElement('div');
    div.className = 'product';
    div.dataset.id = p.id;
    div.innerHTML = `
      <img src="${p.image}" alt="${p.name}" />
      <span>${p.name}</span>
      <span>$${p.price}</span>
    `;
    shop.appendChild(div);
  });
}

// Show product
function showProduct(id) {
  const prod = products.find(p => p.id === id);
  if (!prod) return;
  currentProduct = prod;
  productImage.src = prod.image;
  productImage.alt = prod.name;
  productTitle.textContent = prod.name;
  productPrice.textContent = `$${prod.price}`;
  productDescription.textContent = prod.description;
  productPage.classList.add('active');
}

// Close product
document.querySelector('#backButton').addEventListener('click', () => {
  productPage.classList.remove('active');
});

// Add product click event
shop.addEventListener('click', e => {
  const productDiv = e.target.closest('.product');
  if (productDiv) {
    const id = Number(productDiv.dataset.id);
    showProduct(id);
  }
});

// Add to cart
document.getElementById('addToCart').addEventListener('click', () => {
  if (!currentProduct) return;
  const existing = cart.find(p => p.id === currentProduct.id);
  if (existing) existing.quantity++;
  else cart.push({ ...currentProduct, quantity: 1 });
  updateCart();
});

// Update cart display
function updateCart() {
  cartItemsDiv.innerHTML = '';
  if (cart.length === 0) {
    cartItemsDiv.innerHTML = 'YOUR BAG IS EMPTY.';
    document.getElementById('subtotal').textContent = '$0';
    return;
  }
  let total = 0;
  cart.forEach(item => {
    total += item.price * item.quantity;
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <div>
        <strong>${item.name}</strong><br/>
        $${item.price} x ${item.quantity}
      </div>
      <div class="controls">
        <button class="minus" data-id="${item.id}">−</button>
        <button class="plus" data-id="${item.id}">+</button>
        <div class="remove" data-id="${item.id}">Remove</div>
      </div>
    `;
    cartItemsDiv.appendChild(div);
  });
  document.querySelectorAll('.plus').forEach(btn => {
    btn.onclick = () => {
      const id = Number(btn.dataset.id);
      const item = cart.find(p => p.id === id);
      if (item) {
        item.quantity++;
        updateCart();
      }
    };
  });
  document.querySelectorAll('.minus').forEach(btn => {
    btn.onclick = () => {
      const id = Number(btn.dataset.id);
      const item = cart.find(p => p.id === id);
      if (item) {
        item.quantity--;
        if (item.quantity <= 0) {
          cart = cart.filter(p => p.id !== id);
        }
        updateCart();
      }
    };
  });
  document.querySelectorAll('.remove').forEach(btn => {
    btn.onclick = () => {
      const id = Number(btn.dataset.id);
      cart = cart.filter(p => p.id !== id);
      updateCart();
    };
  });
  document.getElementById('subtotal').textContent = `$${total}`;
}

// Show cart
document.getElementById('viewCartBtn').onclick = () => {
  updateCart();
  cartDiv.classList.toggle('active');
};

// Checkout
document.getElementById('goCheckout').onclick = () => {
  cartDiv.classList.remove('active');
  document.querySelector('.shop').style.display='none';
  document.getElementById('checkout').className='active';
  window.scrollTo(0,0);
};
document.getElementById('placeOrder').onclick = () => {
  document.getElementById('checkout').className='';
  document.getElementById('complete').className='active';
  cart = [];
  updateCart();
};
document.getElementById('continueShopping').onclick = () => {
  document.getElementById('complete').className='';
  document.querySelector('.shop').style.display='grid';
  window.scrollTo(0,0);
};

// Toggle grid layout & spin plus button
toggleButton.onclick = () => {
  // Spin 80 degrees
  toggleButton.style.transition = 'transform 0.5s ease';
  toggleButton.style.transform = 'rotate(80deg)';
  // Animate slide down
  shop.style.transition = 'transform 0.3s ease';
  shop.style.transform = 'translateY(-20px)';
  
  setTimeout(() => {
    // Toggle grid class
    shop.classList.toggle('two-columns');
    // Reset transform
    shop.style.transform = 'translateY(0)';
    // Spin back to original
    toggleButton.style.transform = 'rotate(0deg)';
  }, 500);
};

// Generate items
renderShop();

</script>
</body>
</html>
